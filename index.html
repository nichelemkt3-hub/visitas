<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Validação de Visita</title>
</head>
<body style="font-family: Arial; padding:20px; text-align:center;">

<h3>Validação de Visita</h3>

<input id="email" placeholder="E-mail" style="width:90%" required><br><br>
<input id="local" placeholder="Local da visita" style="width:90%" required><br><br>

<p id="statusGPS">📍 GPS: não capturado</p>
<button onclick="capturarGPS()">Capturar localização</button><br><br>

<video id="video" autoplay playsinline width="300"></video><br>
<button onclick="trocarCamera()">Trocar câmera</button><br><br>

<p id="statusFoto">📸 Foto: não capturada</p>
<button onclick="tirarFoto()">Tirar foto</button><br><br>

<button id="btnEnviar" onclick="enviar()">Confirmar visita</button>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let lat = null;
let lng = null;
let imagem = null;
let usandoTraseira = true;
let streamAtual = null;

const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const btnEnviar = document.getElementById("btnEnviar");

// Substitua pelo URL do seu Web App do Apps Script
const API_URL = "https://script.google.com/macros/s/AKfycbzS710MOHDzouUlgickK6WUsu7IDonfts_EnK_on0hRWpIy05crraSoiQbbKQC-RfPpmg/exec";

/* ===== CÂMERA ===== */
function iniciarCamera() {
  if (streamAtual) streamAtual.getTracks().forEach(t => t.stop());

  navigator.mediaDevices.getUserMedia({
    video: { facingMode: usandoTraseira ? "environment" : "user" }
  }).then(stream => {
    streamAtual = stream;
    video.srcObject = stream;
  }).catch(err => {
    alert("Erro ao acessar câmera: " + err.message);
    console.error(err);
  });
}

function trocarCamera() {
  usandoTraseira = !usandoTraseira;
  iniciarCamera();
}

function tirarFoto() {
  if (!video.videoWidth) { alert("Câmera não pronta"); return; }
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext("2d").drawImage(video, 0, 0);
  imagem = canvas.toDataURL("image/jpeg");
  document.getElementById("statusFoto").innerText = "📸 Foto capturada com sucesso";
}

/* ===== GPS ===== */
function capturarGPS() {
  if (!navigator.geolocation) { alert("Geolocalização não suportada"); return; }

  navigator.geolocation.getCurrentPosition(
    pos => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      document.getElementById("statusGPS").innerText =
        `📍 GPS capturado: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    },
    err => { alert("Erro ao capturar localização: " + err.message); console.error(err); },
    { enableHighAccuracy: true, timeout: 15000 }
  );
}

/* ===== ENVIO ===== */
async function enviar() {
  if (!lat || !lng) { alert("Capture o GPS antes de confirmar"); return; }
  if (!imagem) { alert("Tire a foto antes de confirmar"); return; }

  btnEnviar.disabled = true;
  btnEnviar.innerText = "Enviando...";

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: email.value,
        local: local.value,
        lat,
        lng,
        fotoBase64: imagem
      })
    });

    const json = await response.json();

    if (json.erro) throw new Error(json.erro);

    alert("Visita validada com sucesso!\nCódigo: " + json.codigo);
    btnEnviar.innerText = "Confirmar visita";
    btnEnviar.disabled = false;

  } catch (e) {
    alert("Erro ao validar visita: " + e.message);
    console.error(e);
    btnEnviar.innerText = "Confirmar visita";
    btnEnviar.disabled = false;
  }
}

/* ===== INICIAR CÂMERA AUTOMATICAMENTE ===== */
window.onload = iniciarCamera;
</script>

</body>
</html>
