<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Registro de Visita</title>
</head>

<body style="font-family:Arial;padding:20px;text-align:center">

<h2>Registro de Visita</h2>

<p id="gps">📍 GPS não capturado</p>
<p id="endereco">🏠 Endereço não identificado</p>

<input id="numero" placeholder="Número do local" style="width:90%" /><br><br>

<button onclick="capturar()">Capturar localização</button><br><br>
<button onclick="enviar()">Confirmar visita</button>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyshUhMGzcQieHeuam-WNCTvj3-iAc7nln-Pe19yeCLVvLdUaIL_fYoRXHhpRUl4Km1Yg/exec";

let dados = {};

function capturar() {
  navigator.geolocation.getCurrentPosition(async pos => {
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;

    document.getElementById("gps").innerText =
      `📍 ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    const url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;

    const r = await fetch(url);
    const j = await r.json();

    dados = {
      lat,
      lng,
      rua: j.address.road || '',
      bairro: j.address.suburb || j.address.neighbourhood || '',
      cidade: j.address.city || j.address.town || '',
      estado: j.address.state || '',
      cep: j.address.postcode || ''
    };

    document.getElementById("endereco").innerText =
      `${dados.rua}, ${dados.bairro} - ${dados.cidade}/${dados.estado}`;

  }, err => {
    alert("Erro ao capturar GPS");
  }, { enableHighAccuracy: true });
}

async function enviar() {
  if (!dados.lat) {
    alert("Capture o GPS primeiro");
    return;
  }

  dados.numero = document.getElementById("numero").value;

  const r = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(dados)
  });

  const j = await r.json();

  if (j.erro) {
    alert("Erro: " + j.erro);
  } else {
    alert(
      "Visita registrada!\n\nCódigo:\n" +
      j.codigo +
      "\n\nUse este código no formulário."
    );
  }
}
</script>

</body>
</html>
