<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Captura de Localização</title>
</head>
<body style="font-family: Arial; padding:20px; text-align:center;">

<h2>Captura de Localização da Visita</h2>
<p id="statusGPS">📍 GPS: não capturado</p>
<p id="statusRegiao">🌍 Região: não identificada</p>
<button onclick="capturarGPS()">Capturar localização</button><br><br>
<div id="linkForm" style="display:none;">
  <p>✅ GPS capturado! Clique abaixo para abrir o formulário:</p>
  <a id="btnForm" href="" target="_blank">Abrir Formulário</a>
</div>

<script>
let lat = null;
let lng = null;
let regiao = '';

// Substitua pelo link do seu Google Form
const FORM_BASE_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfJmhbQbklfwYP6XxFo-8hsy-9zsY8YvzmRdkKpCvh2BnpJ_Q/viewform";

async function capturarGPS() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada neste navegador");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    document.getElementById("statusGPS").innerText =
      `📍 GPS capturado: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    // Geocoding via OpenStreetMap Nominatim
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
      const response = await fetch(url);
      const data = await response.json();

      regiao = `${data.address.city || data.address.town || data.address.village || ''} - ${data.address.state || ''}`;
      document.getElementById("statusRegiao").innerText = `🌍 Região: ${regiao}`;

      // Gerar link para abrir Form já com parâmetros
      const urlForm = `${FORM_BASE_URL}?usp=pp_url&entry.1111111111=${lat}&entry.2222222222=${lng}&entry.3333333333=${encodeURIComponent(regiao)}`;
      const btnForm = document.getElementById("btnForm");
      btnForm.href = urlForm;
      document.getElementById("linkForm").style.display = "block";

    } catch (e) {
      console.error(e);
      document.getElementById("statusRegiao").innerText = "🌍 Região: não identificada";
    }

  }, err => {
    alert("Erro ao capturar localização: " + err.message);
    console.error(err);
  }, { enableHighAccuracy: true, timeout: 15000 });
}
</script>

</body>
</html>
