<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Validação de Visita</title>
</head>
<body style="font-family: Arial; padding:20px; text-align:center;">

<h3>Validação de Visita</h3>

<input id="email" placeholder="E-mail" style="width:90%" required><br><br>
<input id="local" placeholder="Local da visita (opcional)" style="width:90%"><br><br>

<p id="statusGPS">📍 GPS: não capturado</p>
<p id="statusRegiao">🌍 Região: não identificada</p>
<button onclick="capturarGPS()">Capturar localização</button><br><br>

<button id="btnEnviar" onclick="enviar()">Confirmar visita</button>

<script>
let lat = null;
let lng = null;
let regiao = '';
const btnEnviar = document.getElementById("btnEnviar");

// Substitua pelo URL do seu Web App do Apps Script (deploy)
const API_URL = "https://script.google.com/macros/s/AKfycbwoMhv4uuKy38jTvF6ee3r9-Thi_JtPA5SF6BIofptANdBglkTzeYdW9TeOSSAdL9kk7w/exec";

/* ===== GPS + Geocoding ===== */
async function capturarGPS() {
  if (!navigator.geolocation) {
    alert("Geolocalização não suportada neste navegador");
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    lat = pos.coords.latitude;
    lng = pos.coords.longitude;
    document.getElementById("statusGPS").innerText =
      `📍 GPS capturado: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;

    // Geocoding via OpenStreetMap Nominatim
    try {
      const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`;
      const response = await fetch(url);
      const data = await response.json();

      regiao = `${data.address.city || data.address.town || data.address.village || ''} - ${data.address.state || ''}`;
      document.getElementById("statusRegiao").innerText = `🌍 Região: ${regiao}`;

    } catch (e) {
      console.error(e);
      document.getElementById("statusRegiao").innerText = "🌍 Região: não identificada";
    }

  }, err => {
    alert("Erro ao capturar localização: " + err.message);
    console.error(err);
  }, { enableHighAccuracy: true, timeout: 15000 });
}

/* ===== ENVIO ===== */
async function enviar() {
  if (!lat || !lng) {
    alert("Capture o GPS antes de confirmar");
    return;
  }

  btnEnviar.disabled = true;
  btnEnviar.innerText = "Enviando...";

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      mode: "cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: document.getElementById("email").value,
        local: document.getElementById("local").value,
        lat,
        lng,
        regiao
      })
    });

    const json = await response.json();

    if (json.erro) throw new Error(json.erro);

    alert("Visita validada com sucesso!\nCódigo: " + json.codigo);
    btnEnviar.innerText = "Confirmar visita";
    btnEnviar.disabled = false;

  } catch (e) {
    alert("Erro ao validar visita: " + e.message);
    console.error(e);
    btnEnviar.innerText = "Confirmar visita";
    btnEnviar.disabled = false;
  }
}
</script>

</body>
</html>
